name: iOS Build

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "lib/**"
      - "ios/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - ".github/workflows/ios-build.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "lib/**"
      - "ios/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - ".github/workflows/ios-build.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-build:
    name: Build iOS (Unsigned)
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.35.3"
          cache: true

      - name: Tool versions
        run: |
          flutter --version
          xcodebuild -version
          pod --version

      - name: Get packages
        run: flutter pub get

      - name: Ensure iOS project files exist
        run: |
          if [ ! -f ios/Podfile ]; then
            flutter create --platforms=ios .
          fi

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Build iOS app (no code signing)
        run: flutter build ios --release --no-codesign

      - name: Package unsigned app
        run: |
          mkdir -p build/ios-artifacts
          ditto -c -k --sequesterRsrc --keepParent build/ios/iphoneos/Runner.app build/ios-artifacts/Runner.app.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-runner-app
          path: build/ios-artifacts/Runner.app.zip
          if-no-files-found: error
